name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@77531abe75cf2b6cdb8c037a10b90d97f438971d # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@77531abe75cf2b6cdb8c037a10b90d97f438971d # main
