name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@4b1a8cebf62d55102a11b7823db49d0dcc82fa51 # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@4b1a8cebf62d55102a11b7823db49d0dcc82fa51 # main
