name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@e9d510eb63674d7e3560deaf75bae50c63b2b30c # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@e9d510eb63674d7e3560deaf75bae50c63b2b30c # main
