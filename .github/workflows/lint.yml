name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@6ec635119328b2787228b5baefb7f6b90a8e7b65 # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@6ec635119328b2787228b5baefb7f6b90a8e7b65 # main
