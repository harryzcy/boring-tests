name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@378368db208350d264ba61887a1c7dc9170364ef # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@378368db208350d264ba61887a1c7dc9170364ef # main
