name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@1d82aac2d0c32747989d4cf82f3f69e05f22ac76 # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@1d82aac2d0c32747989d4cf82f3f69e05f22ac76 # main
