name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@96c175a408fc7de445f2051d28c38ab6094b001f # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@96c175a408fc7de445f2051d28c38ab6094b001f # main
