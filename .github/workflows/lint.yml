name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@04194bc3ab89926d0023537f0c8590ec51735ab9 # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@04194bc3ab89926d0023537f0c8590ec51735ab9 # main
