name: Lint

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@3fcec52bfb900ad7ab335a35eebeb5cd8d9126ea # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@3fcec52bfb900ad7ab335a35eebeb5cd8d9126ea # main
